global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts/greatkart-alerts.yml

scrape_configs:
  - job_name: greatkart-web
    metrics_path: /metrics/
    static_configs:
      - targets:
          - web:8000

  - job_name: greatkart-node
    static_configs:
      - targets:
          - node-exporter:9100
