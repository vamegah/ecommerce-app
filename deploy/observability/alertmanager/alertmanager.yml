route:
  receiver: slack-warning
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical

receivers:
  - name: slack-warning
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#ops-alerts"
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY}
        send_resolved: true
