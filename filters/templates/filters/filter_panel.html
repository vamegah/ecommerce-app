{% load static %}

<link rel="stylesheet" href="{% static 'css/filters.css' %}">

<div id="filter-panel"></div>

<script type="module">
    import FilterSystem from '{% static "js/filters/dist/FilterSystem.js" %}';

    // Initialize filter system
    const filterSystem = new FilterSystem((filteredProducts) => {
        // Update product display
        displayProducts(filteredProducts);
    });

    // Fetch initial products
    async function loadProducts() {
        try {
            const response = await fetch('/filters/api/products/');
            const data = await response.json();
            filterSystem.setProducts(data.products);
        } catch (error) {
            console.error('Failed to load products:', error);
        }
    }

    function displayProducts(products) {
        const container = document.getElementById('products-container');
        if (!container) return;

        container.replaceChildren();

        if (products.length === 0) {
            const emptyMessage = document.createElement('p');
            emptyMessage.textContent = 'No products found matching your filters.';
            container.appendChild(emptyMessage);
            return;
        }

        products.forEach((product) => {
            const card = document.createElement('div');
            const image = document.createElement('img');
            const name = document.createElement('h3');
            const price = document.createElement('p');
            const rating = document.createElement('p');
            const stock = document.createElement('p');
            const imageUrl = safeImageUrl(product.image);

            card.className = 'product-card';

            if (imageUrl) {
                image.src = imageUrl;
            }
            image.alt = product.name || 'Product image';

            name.textContent = product.name || 'Unnamed product';

            price.className = 'price';
            price.textContent = `$${product.price}`;

            rating.className = 'rating';
            rating.textContent = product.rating === null ? 'Rating: Not rated' : `Rating: ${product.rating}/5`;

            stock.className = 'stock';
            stock.textContent = product.inventoryCount > 0 ? 'In Stock' : 'Out of Stock';

            card.append(image, name, price, rating, stock);
            container.appendChild(card);
        });
    }

    function safeImageUrl(value) {
        if (!value) return '';

        try {
            const url = new URL(String(value), window.location.origin);
            return ['http:', 'https:'].includes(url.protocol) ? url.href : '';
        } catch (error) {
            return '';
        }
    }

    // Load products on page load
    loadProducts();
</script>
