{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="section-pagetop bg">
    <div class="container">
        <h2 class="title-page">My Wishlist</h2>
    </div>
</section>

<section class="section-content padding-y">
    <div class="container">
        {% if wishlist_items %}
        <div class="row">
            {% for item in wishlist_items %}
            <div class="col-md-4 mb-4">
                <div class="card card-product-grid h-100">
                    <a href="{{ item.product.get_slug_url }}" class="img-wrap">
                        <img src="{{ item.product.images.url }}" alt="{{ item.product.product_name }}">
                    </a>
                    <figcaption class="info-wrap">
                        <a href="{{ item.product.get_slug_url }}" class="title">{{ item.product.product_name }}</a>
                        <div class="price mt-1">$ {{ item.product.price }}</div>
                        <small class="{% if item.product.is_available and item.product.stock > 0 %}text-success{% else %}text-danger{% endif %}">
                            {% if item.product.is_available and item.product.stock > 0 %}In stock{% else %}Out of stock{% endif %}
                        </small>
                        <div class="mt-3 d-flex">
                            <button
                                type="button"
                                class="btn btn-outline-danger btn-sm mr-2 wishlist-remove-btn"
                                data-product-id="{{ item.product.id }}"
                            >
                                <i class="fa fa-trash"></i> Remove
                            </button>
                            <button
                                type="button"
                                class="btn btn-primary btn-sm wishlist-add-cart-btn"
                                data-product-id="{{ item.product.id }}"
                                data-has-variations="{% if item.product.variation_set.exists %}true{% else %}false{% endif %}"
                                data-product-url="{{ item.product.get_slug_url }}"
                            >
                                <i class="fa fa-shopping-cart"></i> Add to Cart
                            </button>
                        </div>
                    </figcaption>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="alert alert-info text-center">
            <h4>Your wishlist is empty.</h4>
            <p>Save products to keep track of items you love.</p>
            <a href="{% url 'store' %}" class="btn btn-primary">Continue Shopping</a>
        </div>
        {% endif %}
    </div>
</section>
{% endblock %}
