{% load static %}
<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="cache-control" content="max-age=604800" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>GreatKart | Modern Online Shopping</title>

    <link href="{% static 'images/favicon.ico'%}" rel="shortcut icon" type="image/x-icon">

    <!-- Bootstrap4 files-->
    <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" type="text/css" />

    <!-- Font awesome 5 -->
    <link href="{% static 'fonts/fontawesome/css/all.min.css' %}" type="text/css" rel="stylesheet">

    <!-- custom style -->
    <link href="{% static 'css/ui.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'css/responsive.css' %}" rel="stylesheet" media="only screen and (max-width: 1200px)" />

    <link href="{% static 'css/custom.css' %}?v=navbar-20260602" rel="stylesheet" type="text/css" />
    <link href="{% static 'comparison/css/comparison.css' %}?v=navbar-20260602" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- custom javascript -->
    <script src="{% static 'js/script.js' %}" type="text/javascript" defer></script>
    <script src="{% static 'comparison/js/comparison-browser.js' %}?v=navbar-20260602" type="text/javascript" defer></script>
    <script src="{% static 'js/wishlist.js' %}" type="text/javascript" defer></script>

</head>

<body class="greatkart-shell">

    <!-- ========================= Navbar ========================= -->
    {% include 'includes/navbar.html' %}
    <!-- ========================= Navbar end ========================= -->

    {% block content %}
    <!-- Content will be injected here from other templates -->
    {% endblock %}

    <!-- ========================= FOOTER ========================= -->
    {% include 'includes/footer.html' %}
    <!-- ========================= FOOTER end ========================= -->

<script>
(function () {
    function getCookie(name) {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i += 1) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('click', function (event) {
        var link = event.target.closest('.recommendation-link');
        if (!link) {
            return;
        }
        fetch('/recommendations/track-click/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken') || ''
            },
            body: JSON.stringify({
                source_type: link.dataset.sourceType,
                source_product_id: link.dataset.sourceProductId || null,
                recommended_product_id: link.dataset.recommendedProductId
            })
        }).catch(function () {});
    });
})();
</script>

</body>
</html>
