<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.thumb a').forEach(function (thumbnailLink) {
            thumbnailLink.addEventListener('click', function (event) {
                var mainImage = document.querySelector('.mainImage img');
                var imageUrl = thumbnailLink.getAttribute('href');

                if (!mainImage || !imageUrl) {
                    return;
                }

                event.preventDefault();
                mainImage.setAttribute('src', imageUrl);
            });
        });
    });
</script>
