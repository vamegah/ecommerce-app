{% if cart_recommendations %}
<section class="section-name padding-y-sm">
    <header class="section-heading">
        <h4 class="section-title">You May Also Like</h4>
    </header>
    <div class="row">
        {% for product in cart_recommendations %}
        <div class="col-md-4 mb-3">
            <div class="card card-product-grid">
                <a href="{{ product.get_slug_url }}" class="img-wrap recommendation-link"
                   data-source-type="cart"
                   data-source-product-id=""
                   data-recommended-product-id="{{ product.id }}">
                    <img src="{{ product.images.url }}" alt="{{ product.product_name }}">
                </a>
                <figcaption class="info-wrap">
                    <a href="{{ product.get_slug_url }}" class="title recommendation-link"
                       data-source-type="cart"
                       data-source-product-id=""
                       data-recommended-product-id="{{ product.id }}">{{ product.product_name }}</a>
                    <div class="price mt-1">$ {{ product.price }}</div>
                </figcaption>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
{% endif %}
