name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
      - master
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifact:
    name: Build Deploy Artifact
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: shared-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: greatkartecommerce.settings
          DJANGO_CONFIGURATION: Dev
          SECRET_KEY: ${{ secrets.CD_SECRET_KEY }}
          DEBUG: "False"
          SILENCE_IMAGEFIELD_CHECKS: "1"
          EMAIL_HOST_USER: ${{ secrets.CD_EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.CD_EMAIL_HOST_PASSWORD }}
        run: python manage.py collectstatic --noinput

      - name: Archive application
        run: |
          tar --exclude=".git" --exclude="env" --exclude="**/node_modules" -czf greatkart-app.tar.gz .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: greatkart-app
          path: greatkart-app.tar.gz
          if-no-files-found: error
          retention-days: 14

  deploy-staging:
    name: Deploy to Staging
    needs: build-artifact
    if: ${{ secrets.STAGING_DEPLOY_HOST != '' && secrets.STAGING_DEPLOY_USER != '' && secrets.STAGING_DEPLOY_KEY != '' && secrets.STAGING_DEPLOY_PATH != '' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: greatkart-app

      - name: Copy artifact to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_KEY }}
          source: "greatkart-app.tar.gz"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy on staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            tar -xzf greatkart-app.tar.gz
            rm -f greatkart-app.tar.gz
            if [ -f restart.sh ]; then
              bash restart.sh
            fi

  deploy-production:
    name: Deploy to Production
    needs: build-artifact
    if: ${{ secrets.PROD_DEPLOY_HOST != '' && secrets.PROD_DEPLOY_USER != '' && secrets.PROD_DEPLOY_KEY != '' && secrets.PROD_DEPLOY_PATH != '' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: greatkart-app

      - name: Copy artifact to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          source: "greatkart-app.tar.gz"
          target: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            tar -xzf greatkart-app.tar.gz
            rm -f greatkart-app.tar.gz
            if [ -f restart.sh ]; then
              bash restart.sh
            fi
