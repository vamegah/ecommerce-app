name: Terraform Apply
run-name: Terraform apply - ${{ inputs.target_env }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Terraform environment to apply"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: terraform-apply-${{ inputs.target_env }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init -no-color \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.target_env }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Download saved plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.target_env }}
          path: infra/terraform/environments/${{ inputs.target_env }}

      - name: Terraform apply
        run: terraform apply -no-color -input=false -auto-approve tfplan
