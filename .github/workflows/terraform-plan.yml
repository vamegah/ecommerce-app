name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Terraform environment"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env_name: [dev, staging, prod]
    if: ${{ github.event_name == 'pull_request' || matrix.env_name == inputs.target_env }}
    environment: terraform-${{ matrix.env_name }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.env_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init (remote state)
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.env_name }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../..

      - name: Terraform validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init --config=../../.tflint.hcl
          tflint --config=../../.tflint.hcl

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          config_file: infra/terraform/policy/checkov.yaml

      - name: Custom policy checks
        run: bash ../../policy/validate_tf_policies.sh .

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env_name }}
          path: infra/terraform/environments/${{ matrix.env_name }}/tfplan
