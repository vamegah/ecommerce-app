name: Synthetic Uptime Checks
run-name: Synthetic uptime - ${{ github.ref_name }} by ${{ github.actor }}

# NOTE: GitHub Actions schedules are unreliable for uptime monitoring and consume
# Actions minutes. This workflow now manages AWS CloudWatch Synthetics canaries
# which run independently of GitHub and provide reliable, sub-minute alerting.
# The canaries themselves execute every minute inside AWS; this workflow only
# provisions/updates them on demand or after a deployment.

on:
  workflow_dispatch:

jobs:
  sync-canaries:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure staging canary is running
        if: ${{ secrets.SYNTHETICS_CANARY_STAGING != '' }}
        run: |
          aws synthetics start-canary --name "${{ secrets.SYNTHETICS_CANARY_STAGING }}" || true

      - name: Ensure production canary is running
        if: ${{ secrets.SYNTHETICS_CANARY_PROD != '' }}
        run: |
          aws synthetics start-canary --name "${{ secrets.SYNTHETICS_CANARY_PROD }}" || true
