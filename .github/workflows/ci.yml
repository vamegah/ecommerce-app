name: CI
run-name: CI - ${{ github.ref_name }} by ${{ github.actor }}

on:
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - ".kiro/**"
      - ".zap/**"
      - "infra/terraform/**"
      - "performance/**"
      - "deploy/**"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "docs/**"
      - ".kiro/**"
      - ".zap/**"
      - "infra/terraform/**"
      - "performance/**"
      - "deploy/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  django-tests:
    name: Django Tests
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    environment: ci
    env:
      DJANGO_SETTINGS_MODULE: greatkartecommerce.settings
      DJANGO_CONFIGURATION: Dev
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
      DEBUG: "True"
      SILENCE_IMAGEFIELD_CHECKS: "1"
      EMAIL_HOST_USER: ${{ secrets.CI_EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.CI_EMAIL_HOST_PASSWORD }}
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest pytest-django pytest-cov

      - name: Run Django system check
        run: python manage.py check

      - name: Run Django tests with coverage
        run: |
          pytest --ds=greatkartecommerce.settings \
            --cov=filters --cov=coupons --cov=inventory_alerts \
            --cov=addresses --cov=comparison --cov=recommendations \
            --cov=wishlist --cov=orders \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            filters coupons inventory_alerts addresses comparison recommendations wishlist orders

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  node-tests:
    name: Node Tests (${{ matrix.package_dir }})
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - addresses
          - comparison
          - filters
          - inventory_alerts
          - orders/tracking
    defaults:
      run:
        working-directory: ${{ matrix.package_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Node tests
        run: npm test

      - name: Build package
        run: npm run build --if-present

  docker-build-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: greatkart-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          tags: greatkart-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
