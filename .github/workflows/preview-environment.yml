name: PR Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate preview tfvars
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PREVIEW_SECURITY_GROUP_ID: ${{ secrets.PREVIEW_SECURITY_GROUP_ID }}
          PREVIEW_DB_PASSWORD: ${{ secrets.PREVIEW_DB_PASSWORD }}
          PREVIEW_ZONE_ID: ${{ secrets.PREVIEW_ZONE_ID }}
          PREVIEW_ALB_DNS_NAME: ${{ secrets.PREVIEW_ALB_DNS_NAME }}
          PREVIEW_ALB_ZONE_ID: ${{ secrets.PREVIEW_ALB_ZONE_ID }}
          PREVIEW_WEB_TASKDEF_ARN: ${{ secrets.PREVIEW_WEB_TASKDEF_ARN }}
        run: bash infra/terraform/scripts/generate_preview_tfvars.sh

      - name: Apply preview infrastructure
        id: preview_apply
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          bash infra/terraform/scripts/preview_apply.sh
          preview_url=$(terraform -chdir=infra/terraform/environments/preview output -raw preview_url 2>/dev/null || echo "")
          echo "preview_url=$preview_url" >> $GITHUB_OUTPUT

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const previewUrl = '${{ steps.preview_apply.outputs.preview_url }}';
            const urlDisplay = previewUrl ? previewUrl : `https://pr-${pr}.preview.example.com (URL not yet available — check Terraform outputs)`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `Preview environment is ready: ${urlDisplay}`
            });
