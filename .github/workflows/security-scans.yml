name: Security - Dependency, Container, Secret, IaC
run-name: Security scans - ${{ github.ref_name }} by ${{ github.actor }}

on:
  pull_request:
    branches: [main, master]
    paths:
      - "requirements-ci.txt"
      - "**/package.json"
      - "**/package-lock.json"
      - "Dockerfile"
      - "Dockerfile.worker"
      - "docker-compose.yml"
      - "infra/terraform/**"
      - "security/**"
      - ".gitleaks.toml"
      - ".zap/**"
      - ".github/workflows/security-scans.yml"
  workflow_dispatch:
  schedule:
    - cron: "45 3 * * 1"

concurrency:
  group: security-scans-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip audit
        run: pip-audit -r requirements-ci.txt --format json --output pip-audit.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NPM audit (addresses)
        working-directory: addresses
        run: npm audit --audit-level=high --json | tee ../npm-audit-addresses.json

      - name: NPM audit (comparison)
        working-directory: comparison
        run: npm audit --audit-level=high --json | tee ../npm-audit-comparison.json

      - name: NPM audit (filters)
        working-directory: filters
        run: npm audit --audit-level=high --json | tee ../npm-audit-filters.json

      - name: NPM audit (inventory_alerts)
        working-directory: inventory_alerts
        run: npm audit --audit-level=high --json | tee ../npm-audit-inventory-alerts.json

      - name: NPM audit (orders/tracking)
        working-directory: orders/tracking
        run: npm audit --audit-level=high --json | tee ../../npm-audit-orders-tracking.json

      - name: Upload dependency audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audits
          path: |
            pip-audit.json
            npm-audit-*.json

  trivy-container-scan:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: greatkart-web:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          tags: greatkart-worker:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy web image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.24.0
        with:
          image-ref: greatkart-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy worker image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.24.0
        with:
          image-ref: greatkart-worker:scan
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy web SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: Upload Trivy worker SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload Trivy reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-web.sarif
            trivy-worker.sarif

  security-gate:
    runs-on: ubuntu-latest
    needs: [dependency-audit, trivy-container-scan]
    if: always() && !contains(needs.*.result, 'failure') && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dependency audit artifacts
        uses: actions/download-artifact@v4
        with:
          name: dependency-audits

      - name: Download Trivy reports
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports

      - name: Setup Python for security gates
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gate dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Enforce security gate thresholds
        run: python security/policy/enforce_security_gates.py

  secret-scan:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  iac-scan:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          config_file: infra/terraform/policy/checkov.yaml
