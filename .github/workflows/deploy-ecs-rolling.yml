name: Deploy ECS Rolling

on:
  workflow_run:
    workflows: ["Publish Container Images"]
    branches:
      - main
      - master
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      web_image:
        description: "Web image tag (ghcr path:tag)"
        required: true
        type: string
      worker_image:
        description: "Worker image tag (ghcr path:tag)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ inputs.target_env || 'staging' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      prev_web_taskdef: ${{ steps.capture.outputs.prev_web_taskdef }}
      prev_worker_taskdef: ${{ steps.capture.outputs.prev_worker_taskdef }}
      prev_beat_taskdef: ${{ steps.capture.outputs.prev_beat_taskdef }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Pre-deploy checks
        env:
          TARGET_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: bash deploy/zero-downtime/scripts/predeploy_checks.sh

      - name: Migration compatibility checks
        run: bash deploy/zero-downtime/scripts/verify_backward_compatible_migrations.sh

      - name: Capture current task definitions
        id: capture
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WEB: ${{ secrets.ECS_SERVICE_WEB }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          ECS_SERVICE_BEAT: ${{ secrets.ECS_SERVICE_BEAT }}
        run: |
          web_td=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WEB" --query 'services[0].taskDefinition' --output text)
          worker_td=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WORKER" --query 'services[0].taskDefinition' --output text)
          beat_td=$(aws ecs describe-services --region "$AWS_REGION" --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_BEAT" --query 'services[0].taskDefinition' --output text)
          echo "prev_web_taskdef=$web_td" >> $GITHUB_OUTPUT
          echo "prev_worker_taskdef=$worker_td" >> $GITHUB_OUTPUT
          echo "prev_beat_taskdef=$beat_td" >> $GITHUB_OUTPUT

      - name: Register task definitions with new images
        id: register
        env:
          WEB_IMAGE: ${{ inputs.web_image }}
          WORKER_IMAGE: ${{ inputs.worker_image }}
        run: |
          web=$(jq --arg image "$WEB_IMAGE" '.containerDefinitions[0].image=$image' deploy/orchestration/ecs/taskdef-web.json)
          worker=$(jq --arg image "$WORKER_IMAGE" '.containerDefinitions[0].image=$image' deploy/orchestration/ecs/taskdef-worker.json)
          beat=$(jq --arg image "$WORKER_IMAGE" '.containerDefinitions[0].image=$image' deploy/orchestration/ecs/taskdef-beat.json)
          web_arn=$(aws ecs register-task-definition --cli-input-json "$web" --query 'taskDefinition.taskDefinitionArn' --output text)
          worker_arn=$(aws ecs register-task-definition --cli-input-json "$worker" --query 'taskDefinition.taskDefinitionArn' --output text)
          beat_arn=$(aws ecs register-task-definition --cli-input-json "$beat" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "web_taskdef_arn=$web_arn" >> $GITHUB_OUTPUT
          echo "worker_taskdef_arn=$worker_arn" >> $GITHUB_OUTPUT
          echo "beat_taskdef_arn=$beat_arn" >> $GITHUB_OUTPUT

      - name: Run migration with lock
        env:
          DB_ENGINE: postgres
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          WORKDIR: .
          PYTHON_BIN: python
        run: bash deploy/runtime/scripts/run_migrations_safe.sh

      - name: Rolling deploy
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WEB: ${{ secrets.ECS_SERVICE_WEB }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          ECS_SERVICE_BEAT: ${{ secrets.ECS_SERVICE_BEAT }}
          WEB_TASKDEF_ARN: ${{ steps.register.outputs.web_taskdef_arn }}
          WORKER_TASKDEF_ARN: ${{ steps.register.outputs.worker_taskdef_arn }}
          BEAT_TASKDEF_ARN: ${{ steps.register.outputs.beat_taskdef_arn }}
        run: bash deploy/zero-downtime/scripts/deploy_ecs_rolling.sh

      - name: Post-deploy smoke tests
        env:
          TARGET_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: bash deploy/zero-downtime/scripts/smoke_tests.sh

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ failure() }}
    environment: ${{ inputs.target_env || 'staging' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Roll back ECS services
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE_WEB: ${{ secrets.ECS_SERVICE_WEB }}
          ECS_SERVICE_WORKER: ${{ secrets.ECS_SERVICE_WORKER }}
          ECS_SERVICE_BEAT: ${{ secrets.ECS_SERVICE_BEAT }}
          PREV_WEB_TASKDEF_ARN: ${{ needs.deploy.outputs.prev_web_taskdef }}
          PREV_WORKER_TASKDEF_ARN: ${{ needs.deploy.outputs.prev_worker_taskdef }}
          PREV_BEAT_TASKDEF_ARN: ${{ needs.deploy.outputs.prev_beat_taskdef }}
        run: bash deploy/zero-downtime/scripts/rollback_ecs_services.sh
