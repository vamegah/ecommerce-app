version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/addresses"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      addresses-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/comparison"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      comparison-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/filters"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      filters-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/inventory_alerts"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      inventory-alerts-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/orders/tracking"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      orders-tracking-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
